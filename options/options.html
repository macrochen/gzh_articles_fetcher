<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>文章管理与对话</title>
  <link rel="stylesheet" href="options.css">
  <script src="lib/marked.min.js"></script>
</head>
<body>
  <div class="main-container">
    <!-- 左侧区域 -->
    <div class="sidebar">
      <div class="scroll-to-operation" id="scrollToOperation" title="跳转到操作区">
        <div class="icon">⚙</div>
      </div>
      <div class="settings-section collapsed">
        <div class="settings-header">
          <h2>设置</h2>
          <span class="toggle-icon">▼</span>
        </div>
          <div class="settings-content">
            <!-- API设置组 -->
            <div class="settings-group">
              <h3>API 设置</h3>
              <div class="setting-row">
                <label for="geminiApiKey">API Key:</label>
                <input type="password" id="geminiApiKey" placeholder="请输入您的 Google Gemini API Key">
              </div>
              <div class="setting-block">
                <label for="aiChatUrls">AI Chat URLs (一行一个，支持 名字|URL 格式):</label>
                <textarea id="aiChatUrls" rows="3" placeholder="例如: ChatGPT|https://chatgpt.com/g/g-69b54bb702f88191949b0725b674eb36&#10;Claude|https://claude.ai/chat"></textarea>
              </div>
              <div class="setting-block">
                <label for="summaryPrompt">总结提示词:</label>
                <textarea id="summaryPrompt" rows="4" placeholder="例如：请总结以下内容"></textarea>
              </div>
              <div class="setting-block">
                <label for="autoSendInterval">自动批量发送间隔(分钟):</label>
                <input type="number" id="autoSendInterval" value="5" min="0.1" step="0.1" style="width: 80px;">
              </div>
            </div>
            <!-- 注入设置组 -->
            <div class="settings-group">
              <h3>注入设置</h3>
              <div class="setting-block">
                <label for="targetSites">在指定网站注入抓取按钮 (一行一个):</label>
                <textarea id="targetSites" rows="4" placeholder="例如: https://www.some-site.com"></textarea>
              </div>
              <div class="setting-block">
                <label for="excludedAutoFetchUrls">自动抓取排除列表 (一行一个 URL，支持完整匹配和模糊匹配):</label>
                <textarea id="excludedAutoFetchUrls" rows="4" placeholder="例如: https://mp.weixin.qq.com/s/abc123 或 biz=Mz..."></textarea>
              </div>
            </div>
            <!-- 导出设置组 -->
            <div class="settings-group">
              <h3>导出设置</h3>
              <div class="setting-block">
                <label for="exportFormat">本地导出格式:</label>
                <select id="exportFormat">
                  <option value="json">JSON (.json)</option>
                  <option value="txt">纯文本 (.txt)</option>
                  <option value="md">Markdown (.md)</option>
                </select>
              </div>
              <div class="setting-block">
                <label for="driveFolderName">Google Drive 文件夹名:</label>
                <input type="text" id="driveFolderName" placeholder="默认: gzh_articles">
              </div>
            </div>
            <div class="settings-actions">
              <button id="editPresetPrompts">编辑预设提示词</button>
              <button id="resetAllSettings">恢复默认设置</button>
              <button id="saveSettings">保存设置</button>
            </div>
        </div>
      </div>
      
      <h1 id="articles-list-title">文章列表</h1>
      <div class="articles-list" id="articlesList"></div>
      <div class="actions">
        <div class="action-group">
          <button id="selectAll">全选</button>
          <button id="selectLastNButton">选最近</button>
          <input type="number" id="selectLastNInput" value="5" style="width: 50px; text-align: center;" title="输入要选择的最近文章数">
          <button id="selectPreviousBatchButton">选上一批</button>
          <button id="deleteSelected">删除选中</button>
        </div>

        <div class="action-group">
          <label style="display: inline-flex; align-items: center; margin-right: 10px; font-size: 13px; cursor: pointer;">
            <input type="checkbox" id="includePromptInAiChat" style="margin-right: 4px; cursor: pointer;">
            带上提示词
          </label>
          <select id="aiChatUrlSelect" style="margin-right: 4px; font-size: 13px; max-width: 150px;"></select>
          <button id="sendToAiChat" style="background-color: #007bff; color: white; border: none;">发送到 AI Chat</button>
          <button id="autoSendToAiChat" style="background-color: #28a745; color: white; border: none;">自动发送</button>
          <button id="summarizeSelected">本地总结</button>
        </div>

        <div class="action-group">
          <button id="exportSelectedToLocal">导出选中</button>
          <button id="importFromLocal">导入数据</button>
          <input type="file" id="importFileInput" accept=".json" style="display: none;">
          <button id="syncToDrive">Google Drive 同步</button>
          <button id="copyToClipboard">选中到剪贴板</button>
          <button id="clearSummary">清理总结</button>
        </div>
      </div>
    </div>
    
    <!-- 分割线 -->
    <!-- <div class="resizer" id="dragMe"></div> -->
    
    <!-- 右侧聊天区域 -->
    <div class="chat-container">
      <select id="articleDropdown" class="article-dropdown">
        <option value="">-- 选择文章开始对话 --</option>
      </select>
      <div class="chat-history" id="chatHistory">
        <!-- 聊天记录将显示在这里 -->
      </div>
      <div class="chat-input">
        <!-- 替换原来的select元素 -->
        <div id="presetPromptsContainer" class="preset-prompts-container"></div>
        <textarea id="chatInput" placeholder="输入您的问题..."></textarea>
        <button id="sendChatMessage">发送</button>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
